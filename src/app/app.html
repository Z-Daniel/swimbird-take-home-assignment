<a
  href="#main-content"
  class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-50 focus:rounded-lg focus:bg-blue-600 focus:px-4 focus:py-2 focus:text-sm focus:font-medium focus:text-white focus:outline-none"
>
  Skip to main content
</a>

<header class="sticky top-0 z-10 border-b border-(--color-border) bg-(--color-surface)">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-(--density-padding) py-3">
    <a routerLink="/dashboard" class="text-lg font-semibold text-(--color-text) no-underline">Portfolio</a>
    <nav aria-label="Main navigation">
      <ul class="flex gap-6" role="list">
        <li>
          <a
            routerLink="/dashboard"
            routerLinkActive="text-(--color-text)"
            [ariaCurrentWhenActive]="'page'"
            class="text-sm font-medium text-(--color-text-muted) transition-colors hover:text-(--color-text)"
          >
            Dashboard
          </a>
        </li>
        <li>
          <a
            routerLink="/settings"
            routerLinkActive="text-(--color-text)"
            [ariaCurrentWhenActive]="'page'"
            class="text-sm font-medium text-(--color-text-muted) transition-colors hover:text-(--color-text)"
          >
            Settings
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<main id="main-content" class="mx-auto w-full max-w-7xl p-(--density-padding)">
  <router-outlet />
</main>
